<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&amp;family=Rajdhani:wght@700&amp;display=swap');
      .sapien-text {
        font-family: 'Montserrat', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 42px;
        fill: #050505;
        letter-spacing: 5px;
      }
      .robotics-text {
        font-family: 'Rajdhani', 'Arial', sans-serif;
        font-weight: 700;
        font-size: 26px;
        fill: #DC2626;
        letter-spacing: 11px;
      }
    </style>
  </defs>

  <!-- Background for contrast in dark and light modes -->
  <rect width="100%" height="100%" fill="none" />

  <!-- Outer Tech Frame with Nodes -->
  <!-- Top-left node -->
  <circle cx="24" cy="24" r="9" fill="#000000" />

  <!-- Top-right node -->
  <circle cx="296" cy="56" r="9" fill="#000000" />

  <!-- Bottom-center node -->
  <circle cx="160" cy="156" r="9" fill="#000000" />

  <!-- Frame Lines -->
  <!-- Top line connecting top-left dot to top-right corner bracket -->
  <path d="M 33 24 H 272 A 16 16 0 0 1 288 40 V 47" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="round" />

  <!-- Main Left L-Bracket -->
  <path d="M 24 33 V 132 A 24 24 0 0 0 48 156 H 151" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="round" />

  <!-- Bottom-Right Bracket -->
  <path d="M 200 156 H 272 A 24 24 0 0 0 296 132 V 110" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="round" />

  <!-- Logo Text Content -->
  <g transform="translate(48, 80)">
    <text x="0" y="0" class="sapien-text">SAPIEN</text>
    <text x="2" y="38" class="robotics-text">ROBOTICS</text>
  </g>
</svg>
